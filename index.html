<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRUTAG</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
}

header{
padding:25px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(200,169,107,0.3);
background:#111;
}

.logo{
font-size:40px;
font-weight:900;
letter-spacing:8px;
}

.logo span{
color:#c8a96b;
}

header a{
color:#c8a96b;
text-decoration:none;
font-weight:bold;
}

.hero{
min-height:100vh;
padding:80px 30px;
background:linear-gradient(180deg,#050505,#121212);
}

.badge{
color:#c8a96b;
letter-spacing:5px;
text-transform:uppercase;
margin-bottom:25px;
}

h1{
font-size:90px;
line-height:0.9;
margin-bottom:30px;
}

h1 span{
color:#c8a96b;
}

.intro{
max-width:600px;
font-size:20px;
color:#aaa;
line-height:1.7;
margin-bottom:50px;
}

.product{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
align-items:start;
}

.images{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.images img{
width:100%;
background:white;
padding:10px;
}

.card{
background:#111;
padding:30px;
border:1px solid rgba(200,169,107,0.3);
}

.card h2{
font-size:35px;
margin-bottom:10px;
color:#c8a96b;
}

.price{
font-size:40px;
font-weight:900;
margin:20px 0;
color:#c8a96b;
}

.btn{
display:inline-block;
padding:18px 30px;
background:#c8a96b;
color:black;
text-decoration:none;
font-weight:900;
letter-spacing:2px;
}

@media(max-width:800px){

h1{
font-size:60px;
}

.product{
grid-template-columns:1fr;
}

.images{
grid-template-columns:1fr;
}

}
</style>

</head>

<body>

<header>
<div class="logo">BRUT<span>AG</span></div>

<a href="https://instagram.com/brutag__" target="_blank">
Instagram
</a>
</header>

<section class="hero">

<div class="badge">
ROPA USADA PARA HOMBRE
</div>

<h1>
Viste <span>con</span><br>
fuerza
</h1>

<p class="intro">
Solo ropa usada para hombre. Prendas seleccionadas, urbanas y con estilo.
</p>

<div class="product">

<div class="images">
<img src="DF714C16-A2E6-441B-95F2-5F4ECA819392.jpeg">
<img src="5664C4BE-44AF-4AD2-9D0F-12CC1354FB4E.jpeg">
</div>

<div class="card">

<h2>Polerón Grizzly</h2>

<p>Talla XL · Excelente estado</p>

<div class="price">
$20.000
</div>

<a class="btn"
href="https://instagram.com/brutag__"
target="_blank">
Comprar por Instagram
</a>

</div>

</div>

</section>

</body>
</ht
